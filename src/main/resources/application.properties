spring.application.name=marketing-automation-backend

# ===== DevTools — auto restart on class changes =====
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=false

# ===== Server =====
server.port=8080
server.address=0.0.0.0
server.servlet.context-path=/

# ===== Datasource (MySQL) =====
spring.datasource.url=jdbc:mysql://localhost:3306/marketing_automation_prod?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== Flyway – versioned schema migrations =====
# Flyway replaces spring.sql.init; it tracks applied migrations in flyway_schema_history.
# baseline-on-migrate: safe first run on an existing DB (baselines at v0, then runs V1+).
# baseline-version=0 ensures V1 is always applied on first contact with any DB.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# Disable checksum validation so that V1 (baseline schema, modified in-place)
# does not block startup. New versioned migrations (V3, V4 …) still apply.
spring.flyway.validate-on-migrate=false
# Auto-repair a FAILED migration record so the next version can apply cleanly.
spring.flyway.repair-on-migrate=true
# Allow migrations whose version is lower than the highest already-applied version.
# Required when a higher-numbered migration (e.g. V7) was manually inserted into
# flyway_schema_history before lower-numbered files (V5, V6) were executed; without
# this flag Flyway silently skips those "out-of-order" scripts on every startup.
spring.flyway.out-of-order=true
spring.sql.init.mode=never

# ===== JWT =====
# 256-bit (>= 32 chars) secret for HS256. Override in production via env var.
app.jwt.secret=ZmQ4YjI5ZDM0ZTE1YmE3M2M0YzE2MTBkOWM3OWEwYTJmNDgxYjAyZjk5OWE0YTZj
app.jwt.expiration-ms=86400000
app.jwt.issuer=marketing-automation

# ===== CORS =====
# Temporary permissive mode (allow all origins)
app.cors.allowed-origins=*
app.cors.allowed-origin-patterns=*

# ===== Multipart / File Upload =====
# All files (images, documents, videos) go to the external image server.
# Set generous limits so large files aren't rejected before the proxy call.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB

# ===== Logging =====
# Detailed levels are configured in logback-spring.xml.
# Override here for quick ad-hoc changes without touching logback.
logging.config=classpath:logback-spring.xml
# Uncomment to enable SQL query logging for debugging:
# logging.level.org.springframework.jdbc.core=DEBUG
